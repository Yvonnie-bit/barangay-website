<!-- PAGE 4: MEDICAL SUPPLY INVENTORY (medical-supplies.html) -->
<!-- ============================================================ -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Supply Inventory</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: #f0f4f9; padding: 1.5rem; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .page-card { background: #ffffff; border-radius: 28px; box-shadow: 0 6px 20px rgba(0,0,0,0.04); padding: 1.8rem 2rem 2.2rem; border: 1px solid #e6edf4; max-width: 750px; width: 100%; }
        .page-title { font-size: 0.9rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; color: #4b6a7c; margin-bottom: 1.4rem; border-bottom: 2px solid #e1e8f0; padding-bottom: 0.5rem; display: flex; align-items: center; gap: 10px; }
        .page-title i { color: #256f8a; font-size: 1.1rem; }
        .toolbar-row { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; margin-bottom: 1rem; gap: 0.8rem; }
        .btn-add { background: #1a4f69; color: white; border: none; padding: 0.4rem 1.5rem; border-radius: 40px; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: background 0.2s; }
        .btn-add:hover { background: #0f3b4e; }
        .search-box { display: flex; align-items: center; background: #f1f6fc; border-radius: 60px; padding: 0.1rem 0.1rem 0.1rem 1.2rem; border: 1px solid #d6e0ea; }
        .search-box i { color: #627a8a; }
        .search-box input { border: none; background: transparent; padding: 0.4rem 0.7rem; font-size: 0.85rem; width: 160px; }
        .search-box input:focus { outline: none; }
        .supply-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .supply-table th { text-align: left; font-weight: 600; color: #1f3d4f; border-bottom: 2px solid #dae2ec; padding: 0.5rem 0.2rem; }
        .supply-table td { padding: 0.6rem 0.2rem; border-bottom: 1px solid #eaf0f7; }
        .supply-table tr:last-child td { border-bottom: none; }
        .supply-table tr { cursor: pointer; transition: background 0.2s; }
        .supply-table tr:hover { background: #f6faff; }
        .badge { font-size: 0.7rem; font-weight: 600; padding: 0.2rem 0.9rem; border-radius: 40px; }
        .badge-available { background: #d1fae5; color: #0a5e3f; }
        .badge-low { background: #fef3c7; color: #7a6217; }
        .badge-critical { background: #fee2e2; color: #a11f1f; }
        .report-link { margin-top: 0.8rem; font-size: 0.8rem; color: #4a6a7c; text-align: right; cursor: pointer; }
        .report-link:hover { color: #256f8a; }
        .back-link { display: inline-block; margin-bottom: 1rem; color: #256f8a; cursor: pointer; font-weight: 500; }
        .back-link:hover { text-decoration: underline; }
        .nav-right { display: flex; align-items: center; gap: 0.5rem; }
        .logout-btn { background: none; border: none; color: #a11f1f; cursor: pointer; font-weight: 500; padding: 0.2rem 0.6rem; border-radius: 20px; }
        .logout-btn:hover { background: #fee2e2; }
    </style>
</head>
<body>
    <div class="page-card">
        <div class="page-title"><i class="fas fa-capsules"></i> Medical Supply Inventory</div>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem;">
            <span class="back-link" onclick="window.location.href='admin-dashboard.html'"><i class="fas fa-arrow-left"></i> Back to Dashboard</span>
            <button class="logout-btn" onclick="window.location.href='index.html'"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
        
        <div class="toolbar-row">
            <button class="btn-add" onclick="alert('Add Supply form would open')"><i class="fas fa-plus"></i> Add Supply</button>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search supplies..." oninput="filterTable(this.value)">
            </div>
        </div>
        
        <table class="supply-table" id="supplyTable">
            <thead><tr><th>Supply Name</th><th>Qty</th><th>Expiry</th><th>Status</th></tr></thead>
            <tbody>
                <tr onclick="alert('Update Paracetamol')"><td>Paracetamol</td><td>150</td><td>12/2027</td><td><span class="badge badge-available">Available</span></td></tr>
                <tr onclick="alert('Update Alcohol')"><td>Alcohol</td><td>75</td><td>09/2026</td><td><span class="badge badge-low">Low Stock</span></td></tr>
                <tr onclick="alert('Update Face masks')"><td>Face masks</td><td>220</td><td>03/2028</td><td><span class="badge badge-available">Available</span></td></tr>
                <tr onclick="alert('Update Iodine')"><td>Iodine</td><td>12</td><td>11/2025</td><td><span class="badge badge-critical">Critical</span></td></tr>
            </tbody>
        </table>
        <div class="report-link" onclick="alert('Inventory Reports generated')"><i class="fas fa-print"></i> Inventory Reports</div>
    </div>

    <script>
        function filterTable(searchTerm) {
            const rows = document.querySelectorAll('#supplyTable tbody tr');
            const term = searchTerm.toLowerCase();
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(term) ? '' : 'none';
            });
        }
    </script>
</body>
</html>
